AWSTemplateFormatVersion: '2010-09-09'
Description: Basic CloudFormation stack for the AI Photo Search assignment.

Parameters:
  ApiStageName:
    Type: String
    Default: v1
    Description: API Gateway deployment stage name.

  ApiKeyValue:
    Type: String
    Default: eeh3F5fpkTNWGv4HEkm66oyD8Ws47VT3aCTDgwr9
    NoEcho: true
    Description: API key value used by the frontend and API Gateway usage plan.

  OpenSearchEndpoint:
    Type: String
    Default: ""
    Description: OpenSearch domain endpoint, including https://.

  OpenSearchIndex:
    Type: String
    Default: photos
    Description: OpenSearch index name used for photo documents.

  OpenSearchBasePath:
    Type: String
    Default: ""
    Description: Optional base path if OpenSearch is fronted by a reverse proxy.

  LexBotId:
    Type: String
    Default: ""
    Description: Lex V2 bot ID used by search-photos.

  LexBotAliasId:
    Type: String
    Default: ""
    Description: Lex V2 bot alias ID used by search-photos.

  LexLocaleId:
    Type: String
    Default: en_US
    Description: Lex locale ID used by search-photos.

Resources:
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::AccountId}-cchw3-frontend
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowPublicRead
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${FrontendBucket}/*

  PhotosBucket:
    Type: AWS::S3::Bucket
    DependsOn: LambdaPermissionIndex
    Properties:
      BucketName: !Sub ${AWS::AccountId}-cchw3-photos
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:Put
            Function: !GetAtt IndexPhotosFunction.Arn

  IndexPhotosRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: IndexPhotosAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - rekognition:DetectLabels
                  - s3:GetObject
                  - es:ESHttpGet
                  - es:ESHttpPost
                  - es:ESHttpPut
                Resource: '*'

  SearchPhotosRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SearchPhotosAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lex:PostText
                  - lex:RecognizeText
                  - es:ESHttpGet
                  - es:ESHttpPost
                Resource: '*'

  IndexPhotosFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: index-photos
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt IndexPhotosRole.Arn
      Timeout: 10
      Environment:
        Variables:
          OPENSEARCH_ENDPOINT: !Ref OpenSearchEndpoint
          OPENSEARCH_INDEX: !Ref OpenSearchIndex
          OPENSEARCH_BASE_PATH: !Ref OpenSearchBasePath
      Code:
        ZipFile: |
          "use strict";
          const AWS = require("aws-sdk");
          const https = require("https");
          const s3 = new AWS.S3();
          const rekognition = new AWS.Rekognition();
          const INDEX_NAME = process.env.OPENSEARCH_INDEX || "photos";
          const OPENSEARCH_ENDPOINT = process.env.OPENSEARCH_ENDPOINT || process.env.ELASTICSEARCH_ENDPOINT || "";
          const OPENSEARCH_BASE_PATH = process.env.OPENSEARCH_BASE_PATH || "";
          const REGION = process.env.AWS_REGION || process.env.AWS_DEFAULT_REGION || "us-east-1";

          exports.handler = async (event) => {
            const records = Array.isArray(event?.Records) ? event.Records : [];
            const results = [];
            for (const record of records) results.push(await indexRecord(record));
            return { statusCode: 200, body: JSON.stringify({ ok: true, processed: results.length, results }) };
          };

          async function indexRecord(record) {
            const bucket = record?.s3?.bucket?.name;
            const objectKey = decodeS3Key(record?.s3?.object?.key);
            if (!bucket || !objectKey) throw new Error("Invalid S3 event payload");

            const headResponse = await s3.headObject({ Bucket: bucket, Key: objectKey }).promise();
            const rekognitionResponse = await rekognition.detectLabels({
              Image: { S3Object: { Bucket: bucket, Name: objectKey } },
              MaxLabels: 20,
              MinConfidence: 70
            }).promise();

            const customLabels = splitLabels(headResponse.Metadata?.customlabels || "");
            const rekognitionLabels = (rekognitionResponse.Labels || []).map((label) => normalizeLabel(label.Name));
            const labels = uniqueLabels([...customLabels, ...rekognitionLabels]);
            const document = { objectKey, bucket, createdTimestamp: toIsoTimestamp(headResponse.LastModified || record?.eventTime), labels };

            if (OPENSEARCH_ENDPOINT) await saveDocument(document);
            else console.log("OpenSearch endpoint not configured; skipping index write", document);
            return document;
          }

          async function saveDocument(document) {
            const url = new URL(OPENSEARCH_ENDPOINT);
            const endpoint = new AWS.Endpoint(url.origin);
            const path = [
              url.pathname.replace(/\/$/, ""),
              OPENSEARCH_BASE_PATH.replace(/^\/+|\/+$/g, ""),
              INDEX_NAME,
              "_doc",
              encodeURIComponent(document.objectKey)
            ].filter(Boolean).join("/").replace(/\/\/+/g, "/");

            const request = new AWS.HttpRequest(endpoint, REGION);
            request.method = "PUT";
            request.path = path.startsWith("/") ? path : `/${path}`;
            request.headers.host = endpoint.host;
            request.headers["content-type"] = "application/json";
            request.body = JSON.stringify(document);
            const credentials = await getResolvedCredentials();
            signOpenSearchRequest(request, credentials);

            const response = await requestJson({ hostname: endpoint.hostname, method: request.method, path: request.path, headers: request.headers, body: request.body });
            if (response.statusCode < 200 || response.statusCode >= 300) {
              const payload = parseJsonBody(response.body);
              throw new Error(payload?.error?.reason || payload?.message || `OpenSearch HTTP ${response.statusCode}`);
            }
          }

          function normalizeLabel(value) {
            return String(value || "").trim().toLowerCase().replace(/[^a-z0-9]+/g, " ").replace(/\s+/g, " ").trim();
          }
          function splitLabels(rawValue) { return String(rawValue || "").split(",").map((label) => normalizeLabel(label)).filter(Boolean); }
          function uniqueLabels(labels) { return [...new Set(labels.map((label) => normalizeLabel(label)).filter(Boolean))]; }
          function toIsoTimestamp(value) { const date = value instanceof Date ? value : new Date(value || Date.now()); return Number.isNaN(date.getTime()) ? new Date().toISOString().replace(/\.\d{3}Z$/, "") : date.toISOString().replace(/\.\d{3}Z$/, ""); }
          function decodeS3Key(key) { return decodeURIComponent(String(key || "").replace(/\+/g, " ")); }
          function parseJsonBody(body) { if (!body) return null; try { return JSON.parse(body); } catch { return { message: body }; } }
          function requestJson({ hostname, method, path, headers, body }) {
            return new Promise((resolve, reject) => {
              const req = https.request({ hostname, method, path, headers }, (res) => {
                let data = ""; res.setEncoding("utf8");
                res.on("data", (chunk) => { data += chunk; });
                res.on("end", () => resolve({ statusCode: res.statusCode || 0, headers: res.headers, body: data }));
              });
              req.on("error", reject);
              if (body) req.write(body);
              req.end();
            });
          }
          function signOpenSearchRequest(request, credentials) { new AWS.Signers.V4(request, "es").addAuthorization(credentials, new Date()); }
          async function getResolvedCredentials() {
            if (AWS.config.credentials?.accessKeyId && AWS.config.credentials?.secretAccessKey) return AWS.config.credentials;
            await new Promise((resolve, reject) => AWS.config.getCredentials((error) => error ? reject(error) : resolve()));
            return AWS.config.credentials;
          }

  SearchPhotosFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: search-photos
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt SearchPhotosRole.Arn
      Timeout: 10
      Environment:
        Variables:
          OPENSEARCH_ENDPOINT: !Ref OpenSearchEndpoint
          OPENSEARCH_INDEX: !Ref OpenSearchIndex
          OPENSEARCH_BASE_PATH: !Ref OpenSearchBasePath
          LEX_BOT_ID: !Ref LexBotId
          LEX_BOT_ALIAS_ID: !Ref LexBotAliasId
          LEX_LOCALE_ID: !Ref LexLocaleId
      Code:
        ZipFile: |
          "use strict";
          const AWS = require("aws-sdk");
          const https = require("https");
          const REGION = process.env.AWS_REGION || process.env.AWS_DEFAULT_REGION || "us-east-1";
          const INDEX_NAME = process.env.OPENSEARCH_INDEX || "photos";
          const OPENSEARCH_ENDPOINT = process.env.OPENSEARCH_ENDPOINT || process.env.ELASTICSEARCH_ENDPOINT || "";
          const OPENSEARCH_BASE_PATH = process.env.OPENSEARCH_BASE_PATH || "";
          const LEX_BOT_ID = process.env.LEX_BOT_ID || "";
          const LEX_BOT_ALIAS_ID = process.env.LEX_BOT_ALIAS_ID || "";
          const LEX_LOCALE_ID = process.env.LEX_LOCALE_ID || "en_US";
          const lexRuntimeV2 = new AWS.LexRuntimeV2({ region: REGION });
          const STOP_WORDS = new Set(["show","me","photo","photos","image","images","with","the","and","a","an","at","in","of","my","please","find","for","them","to","on"]);

          exports.handler = async (event) => {
            const query = String(event?.queryStringParameters?.q || "").trim();
            if (!query) return jsonResponse(200, { query, results: [] });
            const keywords = uniqueLabels(await disambiguateQuery(query));
            if (!keywords.length || !OPENSEARCH_ENDPOINT) return jsonResponse(200, { query, keywords, results: [] });
            const results = await searchDocuments(keywords);
            return jsonResponse(200, { query, keywords, results });
          };

          async function disambiguateQuery(query) {
            if (!LEX_BOT_ID || !LEX_BOT_ALIAS_ID) return extractKeywords(query);
            try {
              const response = await lexRuntimeV2.recognizeText({ botId: LEX_BOT_ID, botAliasId: LEX_BOT_ALIAS_ID, localeId: LEX_LOCALE_ID, sessionId: `search-${Date.now()}`, text: query }).promise();
              const interpretation = response.interpretations?.[0];
              const slots = interpretation?.intent?.slots || {};
              const slotKeywords = Object.values(slots).flatMap((slot) => extractSlotValue(slot)).filter(Boolean);
              if (slotKeywords.length) return slotKeywords;
              const generated = extractKeywords(interpretation?.inputTranscript || query);
              return generated.length ? generated : extractKeywords(query);
            } catch (error) {
              console.warn("Lex disambiguation failed; falling back to keyword extraction", error);
              return extractKeywords(query);
            }
          }

          function extractSlotValue(slot) {
            const values = [];
            if (!slot) return values;
            if (typeof slot.value?.interpretedValue === "string") values.push(slot.value.interpretedValue);
            if (Array.isArray(slot.values)) {
              for (const item of slot.values) if (typeof item?.value?.interpretedValue === "string") values.push(item.value.interpretedValue);
            }
            return values.map((value) => normalizeLabel(value)).filter(Boolean);
          }

          function extractKeywords(query) {
            return String(query || "").toLowerCase().split(/[^a-z0-9]+/).map((token) => normalizeLabel(token)).filter((token) => token.length > 1).filter((token) => !STOP_WORDS.has(token));
          }

          async function searchDocuments(keywords) {
            const url = new URL(OPENSEARCH_ENDPOINT);
            const endpoint = new AWS.Endpoint(url.origin);
            const path = [url.pathname.replace(/\/$/, ""), OPENSEARCH_BASE_PATH.replace(/^\/+|\/+$/g, ""), INDEX_NAME, "_search"].filter(Boolean).join("/").replace(/\/\/+/g, "/");
            const queryBody = { size: 25, query: { bool: { should: keywords.map((keyword) => ({ multi_match: { query: keyword, fields: ["labels", "objectKey"] } })), minimum_should_match: 1 } } };
            const request = new AWS.HttpRequest(endpoint, REGION);
            request.method = "POST";
            request.path = path.startsWith("/") ? path : `/${path}`;
            request.headers.host = endpoint.host;
            request.headers["content-type"] = "application/json";
            request.body = JSON.stringify(queryBody);
            const credentials = await getResolvedCredentials();
            signOpenSearchRequest(request, credentials);

            const response = await requestJson({ hostname: endpoint.hostname, method: request.method, path: request.path, headers: request.headers, body: request.body });
            if (response.statusCode < 200 || response.statusCode >= 300) {
              const payload = parseJsonBody(response.body);
              throw new Error(payload?.error?.reason || payload?.message || `OpenSearch HTTP ${response.statusCode}`);
            }

            const payload = parseJsonBody(response.body);
            const hits = Array.isArray(payload?.hits?.hits) ? payload.hits.hits : [];
            return hits.map((hit) => ({
              objectKey: hit?._source?.objectKey || hit?._id || "",
              bucket: hit?._source?.bucket || "",
              createdTimestamp: hit?._source?.createdTimestamp || "",
              labels: Array.isArray(hit?._source?.labels) ? hit._source.labels : [],
              imageUrl: hit?._source?.imageUrl || ""
            }));
          }

          function jsonResponse(statusCode, body) { return { statusCode, headers: { "Content-Type": "application/json", "Access-Control-Allow-Origin": "*" }, body: JSON.stringify(body) }; }
          function normalizeLabel(value) { return String(value || "").trim().toLowerCase().replace(/[^a-z0-9]+/g, " ").replace(/\s+/g, " ").trim(); }
          function uniqueLabels(labels) { return [...new Set(labels.map((label) => normalizeLabel(label)).filter(Boolean))]; }
          function parseJsonBody(body) { if (!body) return null; try { return JSON.parse(body); } catch { return { message: body }; } }
          function requestJson({ hostname, method, path, headers, body }) {
            return new Promise((resolve, reject) => {
              const req = https.request({ hostname, method, path, headers }, (res) => {
                let data = ""; res.setEncoding("utf8");
                res.on("data", (chunk) => { data += chunk; });
                res.on("end", () => resolve({ statusCode: res.statusCode || 0, headers: res.headers, body: data }));
              });
              req.on("error", reject);
              if (body) req.write(body);
              req.end();
            });
          }
          function signOpenSearchRequest(request, credentials) { new AWS.Signers.V4(request, "es").addAuthorization(credentials, new Date()); }
          async function getResolvedCredentials() {
            if (AWS.config.credentials?.accessKeyId && AWS.config.credentials?.secretAccessKey) return AWS.config.credentials;
            await new Promise((resolve, reject) => AWS.config.getCredentials((error) => error ? reject(error) : resolve()));
            return AWS.config.credentials;
          }

  LambdaPermissionSearch:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt SearchPhotosFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PhotoSearchApi}/*/GET/search

  LambdaPermissionIndex:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt IndexPhotosFunction.Arn
      Principal: s3.amazonaws.com
      SourceArn: !Sub arn:aws:s3:::${AWS::AccountId}-cchw3-photos
      SourceAccount: !Ref AWS::AccountId

  ApiGatewayS3Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApiGatewayS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub arn:aws:s3:::${PhotosBucket}/*

  PhotoSearchApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: ai-photo-search-api
      Description: REST API for the AI photo search assignment.
      EndpointConfiguration:
        Types:
          - REGIONAL
      BinaryMediaTypes:
        - image/jpeg
        - image/jpg
        - image/png
        - image/webp
        - image/gif
        - application/octet-stream

  SearchResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PhotoSearchApi
      ParentId: !GetAtt PhotoSearchApi.RootResourceId
      PathPart: search

  PhotosResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PhotoSearchApi
      ParentId: !GetAtt PhotoSearchApi.RootResourceId
      PathPart: photos

  UploadResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PhotoSearchApi
      ParentId: !GetAtt PhotoSearchApi.RootResourceId
      PathPart: upload

  PhotosObjectResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PhotoSearchApi
      ParentId: !Ref PhotosResource
      PathPart: '{object}'

  UploadObjectResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PhotoSearchApi
      ParentId: !Ref UploadResource
      PathPart: '{object}'

  SearchOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PhotoSearchApi
      ResourceId: !Ref SearchResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  SearchGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PhotoSearchApi
      ResourceId: !Ref SearchResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestParameters:
        method.request.querystring.q: false
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SearchPhotosFunction.Arn}/invocations

  PhotosOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PhotoSearchApi
      ResourceId: !Ref PhotosObjectResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Api-Key,x-amz-meta-customLabels'"
              method.response.header.Access-Control-Allow-Methods: "'OPTIONS,PUT'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  UploadOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PhotoSearchApi
      ResourceId: !Ref UploadObjectResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Api-Key,x-amz-meta-customLabels'"
              method.response.header.Access-Control-Allow-Methods: "'OPTIONS,PUT'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  PhotosPutMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PhotoSearchApi
      ResourceId: !Ref PhotosObjectResource
      HttpMethod: PUT
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestParameters:
        method.request.path.object: true
        method.request.header.Content-Type: false
        method.request.header.x-amz-meta-customLabels: false
      Integration:
        Type: AWS
        IntegrationHttpMethod: PUT
        ContentHandling: CONVERT_TO_BINARY
        Credentials: !GetAtt ApiGatewayS3Role.Arn
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:s3:path/${PhotosBucket}/{object}
        RequestParameters:
          integration.request.path.object: method.request.path.object
          integration.request.header.Content-Type: method.request.header.Content-Type
          integration.request.header.x-amz-meta-customLabels: method.request.header.x-amz-meta-customLabels
        PassthroughBehavior: WHEN_NO_MATCH
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Api-Key,x-amz-meta-customLabels'"
              method.response.header.Access-Control-Allow-Methods: "'OPTIONS,PUT'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  UploadPutMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PhotoSearchApi
      ResourceId: !Ref UploadObjectResource
      HttpMethod: PUT
      AuthorizationType: NONE
      ApiKeyRequired: true
      RequestParameters:
        method.request.path.object: true
        method.request.header.Content-Type: false
        method.request.header.x-amz-meta-customLabels: false
      Integration:
        Type: AWS
        IntegrationHttpMethod: PUT
        ContentHandling: CONVERT_TO_BINARY
        Credentials: !GetAtt ApiGatewayS3Role.Arn
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:s3:path/${PhotosBucket}/{object}
        RequestParameters:
          integration.request.path.object: method.request.path.object
          integration.request.header.Content-Type: method.request.header.Content-Type
          integration.request.header.x-amz-meta-customLabels: method.request.header.x-amz-meta-customLabels
        PassthroughBehavior: WHEN_NO_MATCH
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Api-Key,x-amz-meta-customLabels'"
              method.response.header.Access-Control-Allow-Methods: "'OPTIONS,PUT'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ApiGatewayDefault4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref PhotoSearchApi
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Api-Key,x-amz-meta-customLabels'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,PUT,OPTIONS'"
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"

  ApiGatewayDefault5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref PhotoSearchApi
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Api-Key,x-amz-meta-customLabels'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,PUT,OPTIONS'"
        gatewayresponse.header.Access-Control-Allow-Origin: "'*'"

  ApiGatewayApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: ai-photo-search-key
      Enabled: true
      Value: !Ref ApiKeyValue

  ApiGatewayUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ApiGatewayDeployment
    Properties:
      UsagePlanName: ai-photo-search-plan
      ApiStages:
        - ApiId: !Ref PhotoSearchApi
          Stage: !Ref ApiStageName

  ApiGatewayUsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiGatewayApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref ApiGatewayUsagePlan

  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - SearchOptionsMethod
      - SearchGetMethod
      - PhotosOptionsMethod
      - PhotosPutMethod
      - UploadOptionsMethod
      - UploadPutMethod
    Properties:
      RestApiId: !Ref PhotoSearchApi
      StageName: !Ref ApiStageName

Outputs:
  FrontendWebsiteURL:
    Description: Public website URL for the frontend bucket.
    Value: !Sub http://${FrontendBucket}.s3-website-${AWS::Region}.amazonaws.com

  FrontendBucketName:
    Description: Name of the frontend S3 bucket.
    Value: !Ref FrontendBucket

  PhotosBucketName:
    Description: Name of the photo storage bucket.
    Value: !Ref PhotosBucket

  ApiInvokeURL:
    Description: Base invoke URL for the API Gateway stage.
    Value: !Sub https://${PhotoSearchApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}
